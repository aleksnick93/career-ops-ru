# If you set hh_api_token in config/profile.yml, the API path activates.
# Area codes: https://api.hh.ru/areas
#   1=Moscow, 2=Saint Petersburg, 16=Belarus, 40=Kazakhstan,
#   74=Armenia, 28=Georgia, 97=Uzbekistan
#
# hh_queries:
#   - name: "Москва AI Engineer"
#     text: "AI Engineer"
#     area: 1
#     experience: between3And6
#     enabled: false
