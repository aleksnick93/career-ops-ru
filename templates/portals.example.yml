# Portal Scanner Configuration — RU/CIS Edition (Template)
#
# This template is pre-configured for the RU/CIS IT market out of the box.
# Copy this file to portals.yml at the project root. For a typical RU/CIS
# candidate targeting AI / Backend / Fullstack / PM / DevOps / Tech Lead /
# CTO roles it should run without edits via /career-ops scan.
#
# АРХИТЕКТУРА СЛОЁВ:
# - title_filter here is the broad system base covering all 22 archetypes
#   from modes/ru/_shared.md. NO personal preferences go here.
# - Personal archetype exclusions (e.g. "I don't want ML") live in
#   modes/_profile.md → section `Personal Filter Overrides` and are
#   applied at evaluation time, not at scan time.
# - Blocked employers live in the `blocked_employers:` section below;
#   behavior switches via modes/_profile.md → `consider_blacklisted`.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# HOW TO CUSTOMIZE (if needed):
#   1. Copy this file to portals.yml at the project root
#   2. Set modes/_profile.md → Personal Filter Overrides to your archetypes
#   3. Add/remove companies in tracked_companies
#   4. Enable CIS companies by setting cis_companies_enabled: true below
#   5. Uncomment and fill hh_queries: for scan-hh.mjs (after Tier 2.1)

# ─────────────────────────────────────────────
# GLOBAL SWITCHES
# ─────────────────────────────────────────────

# Enable CIS (BY / KZ / AM / GE / UZ) tracked companies. Default: false
# (keep scan signal quiet for Russia-only candidates).
cis_companies_enabled: false

# ─────────────────────────────────────────────
# TITLE FILTER — broad RU/CIS IT base (all 22 archetypes)
# ─────────────────────────────────────────────
#
# Rule: at least 1 positive must match AND 0 negatives must match
# (case-insensitive, substring). Avoid too-short tokens (e.g. "ML"
# would match "LLM", "HTML") — use fully-qualified forms.

