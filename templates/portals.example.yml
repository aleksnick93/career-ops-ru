# ─────────────────────────────────────────────
# SEARCH QUERIES
# ─────────────────────────────────────────────

search_queries:

  # ── RU platforms ──────────────────

  - name: hh.ru — AI / Backend / Fullstack
    query: 'site:hh.ru "AI Engineer" OR "AI инженер" OR "LLM" OR "n8n" OR "Senior PHP" OR "Fullstack" Москва OR удалённо'
    enabled: true

  - name: hh.ru — Tech Lead / CTO
    query: 'site:hh.ru "Tech Lead" OR "Техлид" OR "Руководитель разработки" OR "CTO" Москва'
    enabled: true

  - name: hh.ru — Product / Project Manager
    query: 'site:hh.ru "AI Product Manager" OR "Менеджер продукта" OR "Product Owner" удалённо'
    enabled: true

  - name: Habr Career — AI / Backend
    query: 'site:career.habr.com "AI Engineer" OR "LLM" OR "Senior PHP" OR "Fullstack" OR "n8n"'
    enabled: true

  - name: getmatch.ru — AI / Backend
    query: 'site:getmatch.ru "AI" OR "LLM" OR "PHP" OR "Fullstack" OR "n8n" OR "автоматизация"'
    enabled: true

  # ── International / remote AI roles ──

  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Applied AI" OR "n8n" remote'
    enabled: true

  - name: Greenhouse — AI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" remote'
    enabled: true

  - name: Lever — AI Roles
    query: 'site:jobs.lever.co "AI Engineer" OR "LLMOps" OR "Automation" OR "n8n" remote'
    enabled: true

  - name: Wellfound — AI Startups
    query: 'site:wellfound.com "AI Engineer" OR "AI Automation" OR "LLM" remote'
    enabled: true

  # ── CIS platforms (enable after switching cis_companies_enabled: true) ──

  - name: dev.by — AI / PHP / Fullstack
    query: 'site:devby.io "AI Engineer" OR "PHP" OR "Fullstack" OR "Senior"'
    enabled: false

  - name: rabota.by — AI / Backend
    query: 'site:rabota.by "AI" OR "PHP" OR "Fullstack" Минск'
    enabled: false

  - name: hh.kz — AI / Backend
    query: 'site:hh.kz "AI Engineer" OR "PHP" OR "Fullstack" Алматы OR Астана'
    enabled: false

  - name: staff.am — AI Engineer
    query: 'site:staff.am "AI Engineer" OR "Fullstack"'
    enabled: false

  - name: jobs.ge — Remote AI
    query: 'site:jobs.ge "AI" OR "remote" OR "Fullstack"'
    enabled: false

  - name: hh.uz — AI / Backend
    query: 'site:hh.uz "AI Engineer" OR "Backend"'
    enabled: false

# ─────────────────────────────────────────────
