#     enabled: false

# ─────────────────────────────────────────────
# BLOCKED EMPLOYERS
# ─────────────────────────────────────────────
#
# Companies with known salary delays, mass layoffs, toxic culture.
# Behavior controlled by modes/_profile.md → consider_blacklisted:
#   false (default) → SKIP automatically with reason reference
#   true → evaluate anyway but add hard flag in Block D.1 red flags
#
# Source suggestions: 2GIS reviews, "Правда Сотрудников", Habr comments

blocked_employers: []
  # Example format (uncomment when you discover red flags):
  # - name: "ExampleCorp"
  #   reason: "Salary delays Q2 2026 per Habr Career review"
  #   source: "https://career.habr.com/companies/..."
  #   date_added: "2026-04-10"

